<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <!-- Background -->
  <rect width="1200" height="760" fill="#fafafa"/>

  <!-- ============== LEFT COLUMN: CHAIN REALITY ============== -->
  <g>
    <rect x="40" y="100" width="320" height="500" rx="12" fill="#e8eef2" stroke="#7d8a96" stroke-width="1.5"/>

    <text x="200" y="140" text-anchor="middle" font-size="22" font-weight="700" fill="#3a4a5a">CHAIN REALITY</text>
    <text x="200" y="166" text-anchor="middle" font-size="13" fill="#5a6a7a" font-style="italic">on-chain, gas-metered, sequential</text>

    <g transform="translate(70, 200)">
      <rect width="260" height="62" rx="6" fill="#ffffff" stroke="#9aaab8" stroke-width="1"/>
      <text x="20" y="28" font-size="14" font-weight="600" fill="#3a4a5a">Sequential</text>
      <text x="20" y="48" font-size="12" fill="#6a7a8a">Events ordered by block / tx index</text>
    </g>

    <g transform="translate(70, 276)">
      <rect width="260" height="62" rx="6" fill="#ffffff" stroke="#9aaab8" stroke-width="1"/>
      <text x="20" y="28" font-size="14" font-weight="600" fill="#3a4a5a">Causal</text>
      <text x="20" y="48" font-size="12" fill="#6a7a8a">State at block N depends on N-1</text>
    </g>

    <g transform="translate(70, 352)">
      <rect width="260" height="62" rx="6" fill="#ffffff" stroke="#9aaab8" stroke-width="1"/>
      <text x="20" y="28" font-size="14" font-weight="600" fill="#3a4a5a">Gas-metered</text>
      <text x="20" y="48" font-size="12" fill="#6a7a8a">Every read costs eth / time / RPC quota</text>
    </g>

    <g transform="translate(70, 428)">
      <rect width="260" height="62" rx="6" fill="#ffffff" stroke="#9aaab8" stroke-width="1"/>
      <text x="20" y="28" font-size="14" font-weight="600" fill="#3a4a5a">Single-threaded</text>
      <text x="20" y="48" font-size="12" fill="#6a7a8a">One world, one history, no branching</text>
    </g>

    <text x="200" y="575" text-anchor="middle" font-size="12" fill="#7d8a96">RPC · ABI decode · event stream</text>
  </g>

  <!-- ============== ARROW left → middle ============== -->
  <path d="M 365 340 L 435 340" stroke="#5a8a9a" stroke-width="2.5" fill="none" marker-end="url(#arrowMid)"/>

  <!-- ============== MIDDLE COLUMN: STATE TWIN (hero) ============== -->
  <g>
    <!-- Main background -->
    <rect x="440" y="80" width="320" height="528" rx="14" fill="#d4eef0" stroke="#1a8a99" stroke-width="3"/>

    <!-- NEW LAYER badge (centered, sitting on top edge) -->
    <g transform="translate(600, 67)">
      <rect x="-65" y="0" width="130" height="28" rx="14" fill="#0d5560"/>
      <text x="0" y="19" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff" letter-spacing="2">NEW LAYER</text>
    </g>

    <!-- Hero header — defipy.twin gets prominence -->
    <text x="600" y="125" text-anchor="middle" font-size="16" font-weight="700" fill="#1a8a99" letter-spacing="2">STATE TWIN</text>
    <text x="600" y="170" text-anchor="middle" font-size="32" font-weight="800" fill="#0d5560">defipy.twin</text>
    <text x="600" y="200" text-anchor="middle" font-size="13" fill="#1a6e78" font-style="italic">the missing substrate for agentic DeFi</text>

    <!-- Capability cards (slightly bumped down to make room) -->
    <g transform="translate(470, 230)">
      <rect width="260" height="78" rx="6" fill="#ffffff" stroke="#1a8a99" stroke-width="1.2"/>
      <text x="20" y="28" font-size="14" font-weight="700" fill="#0d5560">Snapshot any state</text>
      <text x="20" y="50" font-size="12" fill="#3d6878">mock recipes · live chain · historical</text>
      <text x="20" y="66" font-size="12" fill="#3d6878">— same canonical PoolSnapshot shape</text>
    </g>

    <g transform="translate(470, 322)">
      <rect width="260" height="78" rx="6" fill="#ffffff" stroke="#1a8a99" stroke-width="1.2"/>
      <text x="20" y="28" font-size="14" font-weight="700" fill="#0d5560">Replay infinitely</text>
      <text x="20" y="50" font-size="12" fill="#3d6878">no chain costs · no rate limits</text>
      <text x="20" y="66" font-size="12" fill="#3d6878">deterministic, repeatable, reversible</text>
    </g>

    <g transform="translate(470, 414)">
      <rect width="260" height="78" rx="6" fill="#ffffff" stroke="#1a8a99" stroke-width="1.2"/>
      <text x="20" y="28" font-size="14" font-weight="700" fill="#0d5560">Branch &amp; compare</text>
      <text x="20" y="50" font-size="12" fill="#3d6878">what-if scenarios · parallel evaluation</text>
      <text x="20" y="66" font-size="12" fill="#3d6878">counterfactual price paths, agent reasoning</text>
    </g>

    <!-- Module composition footer -->
    <text x="600" y="560" text-anchor="middle" font-size="11" fill="#3d6878">PoolSnapshot · StateTwinBuilder · Provider ABC</text>
  </g>

  <!-- ============== ARROW middle → right ============== -->
  <path d="M 765 340 L 835 340" stroke="#1a8a99" stroke-width="2.5" fill="none" marker-end="url(#arrowOut)"/>

  <!-- ============== RIGHT COLUMN: WHAT THIS ENABLES ============== -->
  <g>
    <rect x="840" y="100" width="320" height="500" rx="12" fill="#fde8d4" stroke="#c4793a" stroke-width="1.5"/>

    <text x="1000" y="140" text-anchor="middle" font-size="22" font-weight="700" fill="#7a4818">WHAT THIS ENABLES</text>
    <text x="1000" y="166" text-anchor="middle" font-size="13" fill="#9a5a28" font-style="italic">consumers of the substrate</text>

    <g transform="translate(870, 200)">
      <rect width="260" height="78" rx="6" fill="#ffffff" stroke="#c4793a" stroke-width="1.2"/>
      <text x="20" y="28" font-size="14" font-weight="700" fill="#7a4818">Notebook research</text>
      <text x="20" y="50" font-size="12" fill="#9a5a28">quants exploring positions, IL,</text>
      <text x="20" y="66" font-size="12" fill="#9a5a28">depeg risk, fee tier choice</text>
    </g>

    <g transform="translate(870, 292)">
      <rect width="260" height="78" rx="6" fill="#ffffff" stroke="#c4793a" stroke-width="1.2"/>
      <text x="20" y="28" font-size="14" font-weight="700" fill="#7a4818">Agents that think like analysts</text>
      <text x="20" y="50" font-size="12" fill="#9a5a28">propose, simulate, decide before execution</text>
      <text x="20" y="66" font-size="12" fill="#9a5a28">— proactive reasoning, not chain reaction</text>
    </g>

    <g transform="translate(870, 384)">
      <rect width="260" height="78" rx="6" fill="#ffffff" stroke="#c4793a" stroke-width="1.2"/>
      <text x="20" y="28" font-size="14" font-weight="700" fill="#7a4818">Backtest at scale</text>
      <text x="20" y="50" font-size="12" fill="#9a5a28">thousands of scenarios per minute</text>
      <text x="20" y="66" font-size="12" fill="#9a5a28">no chain overhead, no rate limits</text>
    </g>

    <text x="1000" y="575" text-anchor="middle" font-size="11" fill="#9a5a28">notebooks · agents · dashboards · backtests</text>
  </g>

  <!-- ============== BOTTOM TAGLINE ============== -->
  <g>
    <line x1="60" y1="650" x2="1140" y2="650" stroke="#cccccc" stroke-width="1"/>
    <text x="600" y="690" text-anchor="middle" font-size="16" fill="#3a4a5a" font-weight="500">
      By mirroring AMM state off-chain, DeFiPy lifts pool analytics out of chain constraints —
    </text>
    <text x="600" y="714" text-anchor="middle" font-size="16" fill="#0d5560" font-weight="700">
      letting agents reason like analysts, not just react like traders.
    </text>
  </g>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowMid" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3 L0,6 Z" fill="#5a8a9a"/>
    </marker>
    <marker id="arrowOut" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3 L0,6 Z" fill="#1a8a99"/>
    </marker>
  </defs>
</svg>
