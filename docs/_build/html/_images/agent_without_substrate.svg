<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <!-- Background -->
  <rect width="1200" height="760" fill="#fafafa"/>

  <!-- ============== LEFT COLUMN: CHAIN REALITY (identical to state_twin_concept) ============== -->
  <g>
    <rect x="40" y="100" width="320" height="500" rx="12" fill="#e8eef2" stroke="#7d8a96" stroke-width="1.5"/>

    <text x="200" y="140" text-anchor="middle" font-size="22" font-weight="700" fill="#3a4a5a">CHAIN REALITY</text>
    <text x="200" y="166" text-anchor="middle" font-size="13" fill="#5a6a7a" font-style="italic">on-chain, gas-metered, sequential</text>

    <g transform="translate(70, 200)">
      <rect width="260" height="62" rx="6" fill="#ffffff" stroke="#9aaab8" stroke-width="1"/>
      <text x="20" y="28" font-size="14" font-weight="600" fill="#3a4a5a">Sequential</text>
      <text x="20" y="48" font-size="12" fill="#6a7a8a">Events ordered by block / tx index</text>
    </g>

    <g transform="translate(70, 276)">
      <rect width="260" height="62" rx="6" fill="#ffffff" stroke="#9aaab8" stroke-width="1"/>
      <text x="20" y="28" font-size="14" font-weight="600" fill="#3a4a5a">Causal</text>
      <text x="20" y="48" font-size="12" fill="#6a7a8a">State at block N depends on N-1</text>
    </g>

    <g transform="translate(70, 352)">
      <rect width="260" height="62" rx="6" fill="#ffffff" stroke="#9aaab8" stroke-width="1"/>
      <text x="20" y="28" font-size="14" font-weight="600" fill="#3a4a5a">Gas-metered</text>
      <text x="20" y="48" font-size="12" fill="#6a7a8a">Every read costs eth / time / RPC quota</text>
    </g>

    <g transform="translate(70, 428)">
      <rect width="260" height="62" rx="6" fill="#ffffff" stroke="#9aaab8" stroke-width="1"/>
      <text x="20" y="28" font-size="14" font-weight="600" fill="#3a4a5a">Single-threaded</text>
      <text x="20" y="48" font-size="12" fill="#6a7a8a">One world, one history, no branching</text>
    </g>

    <text x="200" y="575" text-anchor="middle" font-size="12" fill="#7d8a96">RPC · ABI decode · event stream</text>
  </g>

  <!-- ============== ARROW left → middle (broken / degraded) ============== -->
  <path d="M 365 340 L 435 340" stroke="#a04848" stroke-width="2.5" fill="none" marker-end="url(#arrowBroken)" stroke-dasharray="6 5"/>

  <!-- ============== MIDDLE COLUMN: MISSING LAYER (the void) ============== -->
  <g>
    <!-- Main background — pale washed-out, dashed border to signal absence -->
    <rect x="440" y="80" width="320" height="528" rx="14" fill="#f5f1f0" stroke="#a04848" stroke-width="2.5" stroke-dasharray="10 6"/>

    <!-- MISSING LAYER badge (centered, sitting on top edge) -->
    <g transform="translate(600, 67)">
      <rect x="-85" y="0" width="170" height="28" rx="14" fill="#a04848"/>
      <text x="0" y="19" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff" letter-spacing="2">MISSING LAYER</text>
    </g>

    <!-- Hero header — what should be here, isn't -->
    <text x="600" y="125" text-anchor="middle" font-size="16" font-weight="700" fill="#a04848" letter-spacing="2">NO SUBSTRATE</text>
    <text x="600" y="170" text-anchor="middle" font-size="32" font-weight="800" fill="#a04848" opacity="0.6">— · —</text>
    <text x="600" y="200" text-anchor="middle" font-size="13" fill="#8a4040" font-style="italic">agents reason directly against chain state</text>

    <!-- Three "what's missing" cards — same positions as the State Twin diagram's capability cards -->
    <g transform="translate(470, 230)">
      <rect width="260" height="78" rx="6" fill="#fcf6f4" stroke="#c47878" stroke-width="1" stroke-dasharray="4 3"/>
      <text x="20" y="28" font-size="14" font-weight="700" fill="#a04848">No state abstraction</text>
      <text x="20" y="50" font-size="12" fill="#8a4040">every read is an RPC call</text>
      <text x="20" y="66" font-size="12" fill="#8a4040">— no canonical pool shape</text>
    </g>

    <g transform="translate(470, 322)">
      <rect width="260" height="78" rx="6" fill="#fcf6f4" stroke="#c47878" stroke-width="1" stroke-dasharray="4 3"/>
      <text x="20" y="28" font-size="14" font-weight="700" fill="#a04848">No replay</text>
      <text x="20" y="50" font-size="12" fill="#8a4040">chain costs paid every time</text>
      <text x="20" y="66" font-size="12" fill="#8a4040">rate limits, latency, gas, quotas</text>
    </g>

    <g transform="translate(470, 414)">
      <rect width="260" height="78" rx="6" fill="#fcf6f4" stroke="#c47878" stroke-width="1" stroke-dasharray="4 3"/>
      <text x="20" y="28" font-size="14" font-weight="700" fill="#a04848">No branching</text>
      <text x="20" y="50" font-size="12" fill="#8a4040">"what if?" can't be answered</text>
      <text x="20" y="66" font-size="12" fill="#8a4040">— the chain has only one history</text>
    </g>

    <!-- Module footer — what the typical stack ships instead -->
    <text x="600" y="560" text-anchor="middle" font-size="11" fill="#8a4040" font-style="italic">RPC wrappers · vendor APIs · ad-hoc caches</text>
  </g>

  <!-- ============== ARROW middle → right (broken / degraded) ============== -->
  <path d="M 765 340 L 835 340" stroke="#a04848" stroke-width="2.5" fill="none" marker-end="url(#arrowBroken)" stroke-dasharray="6 5"/>

  <!-- ============== RIGHT COLUMN: WHAT YOU GET INSTEAD ============== -->
  <g>
    <rect x="840" y="100" width="320" height="500" rx="12" fill="#fde8d4" stroke="#c4793a" stroke-width="1.5"/>

    <text x="1000" y="140" text-anchor="middle" font-size="22" font-weight="700" fill="#7a4818">WHAT YOU GET INSTEAD</text>
    <text x="1000" y="166" text-anchor="middle" font-size="13" fill="#9a5a28" font-style="italic">degraded consumer outcomes</text>

    <g transform="translate(870, 200)">
      <rect width="260" height="78" rx="6" fill="#ffffff" stroke="#c4793a" stroke-width="1.2"/>
      <text x="20" y="28" font-size="14" font-weight="700" fill="#7a4818">Notebooks that hit RPC walls</text>
      <text x="20" y="50" font-size="12" fill="#9a5a28">slow, throttled, expensive</text>
      <text x="20" y="66" font-size="12" fill="#9a5a28">— exploration capped by quota</text>
    </g>

    <g transform="translate(870, 292)">
      <rect width="260" height="78" rx="6" fill="#ffffff" stroke="#c4793a" stroke-width="1.2"/>
      <text x="20" y="28" font-size="14" font-weight="700" fill="#7a4818">Agents that only react</text>
      <text x="20" y="50" font-size="12" fill="#9a5a28">bound to chain time, no foresight</text>
      <text x="20" y="66" font-size="12" fill="#9a5a28">— reflex without thought</text>
    </g>

    <g transform="translate(870, 384)">
      <rect width="260" height="78" rx="6" fill="#ffffff" stroke="#c4793a" stroke-width="1.2"/>
      <text x="20" y="28" font-size="14" font-weight="700" fill="#7a4818">Backtests that can't scale</text>
      <text x="20" y="50" font-size="12" fill="#9a5a28">no parallel scenarios</text>
      <text x="20" y="66" font-size="12" fill="#9a5a28">— hypotheticals are unreachable</text>
    </g>

    <text x="1000" y="575" text-anchor="middle" font-size="11" fill="#9a5a28">brittle pipelines · vendor lock-in · capped agents</text>
  </g>

  <!-- ============== BOTTOM TAGLINE (pointed) ============== -->
  <g>
    <line x1="60" y1="650" x2="1140" y2="650" stroke="#cccccc" stroke-width="1"/>
    <text x="600" y="690" text-anchor="middle" font-size="16" fill="#3a4a5a" font-weight="500">
      Without a substrate, agents can only react to chain events.
    </text>
    <text x="600" y="714" text-anchor="middle" font-size="16" fill="#a04848" font-weight="700">
      They never get to think ahead.
    </text>
  </g>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowBroken" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3 L0,6 Z" fill="#a04848"/>
    </marker>
  </defs>
</svg>
